name: Daily AI Post

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Validate configuration
        run: |
          if [ -z "${GROQ_API_KEY}" ]; then
            echo "Missing GROQ_API_KEY secret"
            exit 1
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Generate posts
        run: node scripts/generatePost.js 25
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          GROQ_FALLBACK_MODEL: ${{ secrets.GROQ_FALLBACK_MODEL }}
          SITE_NICHE: ${{ secrets.SITE_NICHE }}
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(posts): add daily post $(date -u +'%Y-%m-%d')"
            git push
          fi
